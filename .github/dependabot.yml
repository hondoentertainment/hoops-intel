# Dependabot — keep npm + Actions dependencies current (weekly batches).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      vite-react:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "react*"
          - "@types/react*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
