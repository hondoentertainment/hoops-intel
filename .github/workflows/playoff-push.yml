# Runs every 15 minutes during playoffs: refresh ESPN snapshot, dispatch elimination /
# clincher / tip-off / rival pushes. Silently skips when env vars are absent.
#
# Maintainer checklist (topics, VAPID, Supabase): references/push-notifications.md

name: Playoff Push Alerts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: playoff-push
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Sync playoff board
        run: npm run playoff:sync

      - name: Dispatch playoff pushes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PUSH_API_URL: ${{ secrets.PUSH_API_URL }}
          PUSH_API_SECRET: ${{ secrets.PUSH_API_SECRET }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then ARGS="--require-env"; fi
          node scripts/check-playoff-series.mjs $ARGS
          node scripts/check-clincher-preview.mjs || true
          node scripts/check-tip-off-push.mjs || true
          node scripts/check-rival-tonight.mjs || true
