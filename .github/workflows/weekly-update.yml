name: Weekly Data Update

on:
  schedule:
    # Monday 6:00 AM PST (UTC-8) = 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

concurrency:
  group: weekly-edition
  cancel-in-progress: false

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season.outputs.active }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check NBA season status (season-mode.mjs)
        id: season
        run: |
          ACTIVE=$(node scripts/check-generator-active.mjs)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "generatorActive=$ACTIVE"

      - name: Scheduled run — generator inactive (offseason)
        if: github.event_name == 'schedule' && steps.season.outputs.active != 'true'
        run: |
          echo "::notice::Weekly generator skipped — season-mode reports inactive."

  generate-weekly:
    needs: check-season
    if: needs.check-season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run optimized weekly generation
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          node scripts/generate-all-weekly.mjs 2>&1 | tee generation.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          if [ "$exit_code" -eq 1 ]; then
            echo "Critical failure — aborting"
            exit 1
          elif [ "$exit_code" -eq 2 ]; then
            echo "Partial failure — refusing to commit"
            exit 1
          fi
        timeout-minutes: 15

      - name: Stage weekly data files
        run: node scripts/stage-weekly-edition.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Pre-push CI gate (schema + build)
        if: steps.changes.outputs.changed == 'true'
        run: npm run test:pre-push

      - name: Commit and push weekly data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git commit -m "Weekly update: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          git push origin ${{ github.ref_name }}

      - name: Post-push note
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "::notice::Weekly data pushed — deployment-smoke will verify production."

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes — skipping commit."

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Weekly generation failed — ${today}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'generation-failure',
              per_page: 5,
            });
            const alreadyExists = existing.data.some(i => i.title === title);
            if (!alreadyExists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Weekly Generation Failure\n\n**Date:** ${today}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the workflow logs for details.\n\nThis issue was auto-created by the weekly-update workflow.`,
                labels: ['generation-failure', 'automated'],
              });
            }
