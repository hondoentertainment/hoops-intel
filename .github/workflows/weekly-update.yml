name: Weekly Data Update

on:
  schedule:
    # Monday 6:00 AM PST (UTC-8) = 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save

      - name: Generate trade value index
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-trade-value.mjs || true

      - name: Generate lineups
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-lineups.mjs || true

      - name: Generate tactics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-tactics.mjs || true

      - name: Generate projections
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-projections.mjs || true

      - name: Generate draft intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-draft.mjs || true

      - name: Generate clutch ratings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-clutch.mjs || true

      - name: Generate trade simulator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-trade-sim.mjs || true

      - name: Generate community pulse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-community-pulse.mjs || true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push weekly data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git add client/src/lib/tradeValueData.ts client/src/lib/lineupsData.ts client/src/lib/tacticsData.ts client/src/lib/projectionsData.ts client/src/lib/draftData.ts client/src/lib/clutchData.ts client/src/lib/tradeSimData.ts client/src/lib/communityPulseData.ts
          git commit -m "Weekly update: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes — skipping commit."
