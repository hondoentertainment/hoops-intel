name: Midday Content Refresh

# Lightweight daily refresh that updates sentiment, momentum, and watch guide
# data between the morning edition and evening games. Runs after the morning
# edition has been committed, providing fresher data for afternoon visitors.

on:
  schedule:
    # 2:00 PM PST (22:00 UTC) — afternoon refresh before evening games
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: midday-refresh
  cancel-in-progress: true

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season.outputs.active }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check NBA season status (season-mode.mjs)
        id: season
        run: |
          ACTIVE=$(node scripts/check-generator-active.mjs)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT

  refresh:
    needs: check-season
    if: needs.check-season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Refresh sentiment data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          node scripts/generate-sentiment-daily.mjs || node scripts/generate-sentiment.mjs
        timeout-minutes: 8

      - name: Refresh momentum data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-momentum.mjs
        timeout-minutes: 3

      - name: Refresh watch guide
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-watch-guide.mjs
        timeout-minutes: 3

      - name: Refresh line movement (open → close)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          node scripts/fetch-line-odds.mjs || true
          node scripts/sync-line-movement.mjs sync || true

      - name: Stage midday refresh files
        run: node scripts/stage-midday-refresh.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Pre-push CI gate (schema + build)
        if: steps.changes.outputs.changed == 'true'
        run: npm run test:pre-push

      - name: Commit and push refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git commit -m "Midday refresh: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes — skipping commit."

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Midday refresh failed — ${today}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'generation-failure',
              per_page: 5,
            });
            if (!existing.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Midday Refresh Failure\n\n**Date:** ${today}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['generation-failure', 'automated'],
              });
            }
