name: Midday Content Refresh

# Lightweight daily refresh that updates sentiment, momentum, and watch guide
# data between the morning edition and evening games. Runs after the morning
# edition has been committed, providing fresher data for afternoon visitors.

on:
  schedule:
    # 2:00 PM PST (22:00 UTC) — afternoon refresh before evening games
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: midday-refresh
  cancel-in-progress: true

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season.outputs.active }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Check NBA season status (season-mode.mjs)
        id: season
        run: |
          ACTIVE=$(node scripts/check-generator-active.mjs)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT

  refresh:
    needs: check-season
    if: needs.check-season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run midday refresh (validate outputs)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/run-midday-refresh.mjs
        timeout-minutes: 15

      - name: Stage midday refresh files
        run: node scripts/stage-midday-refresh.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Pre-push CI gate (schema + build)
        if: steps.changes.outputs.changed == 'true'
        run: npm run test:pre-push

      - name: Commit and push refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git commit -m "Midday refresh: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          for attempt in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && git push origin ${{ github.ref_name }} && exit 0
            echo "::warning::Push attempt $attempt failed — retrying after rebase"
            sleep 10
          done
          exit 1

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes — skipping commit."

      - name: Close resolved midday-failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'generation-failure',
              per_page: 100,
            });
            for (const issue of open.data.filter((i) => i.title.startsWith('Midday refresh failed'))) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Midday refresh succeeded in ${runUrl}. Auto-closing this stale failure report.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Midday refresh failed — ${today}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'generation-failure',
              per_page: 5,
            });
            if (!existing.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Midday Refresh Failure\n\n**Date:** ${today}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['generation-failure', 'automated'],
              });
            }
