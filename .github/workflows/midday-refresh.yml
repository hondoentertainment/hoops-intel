name: Midday Content Refresh

# Lightweight daily refresh that updates sentiment, momentum, and watch guide
# data between the morning edition and evening games. Runs after the morning
# edition has been committed, providing fresher data for afternoon visitors.

on:
  schedule:
    # 2:00 PM PST (22:00 UTC) — afternoon refresh before evening games
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: midday-refresh
  cancel-in-progress: true

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season.outputs.active }}
    steps:
      - name: Check NBA season status
        id: season
        run: |
          MONTH=$(date -u +%-m)
          if [ "$MONTH" -ge 7 ] && [ "$MONTH" -le 9 ]; then
            echo "active=false" >> $GITHUB_OUTPUT
          else
            echo "active=true" >> $GITHUB_OUTPUT
          fi

  refresh:
    needs: check-season
    if: needs.check-season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save

      - name: Refresh sentiment data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-sentiment-daily.mjs || node scripts/generate-sentiment.mjs || true
        timeout-minutes: 3

      - name: Refresh momentum data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-momentum.mjs || true
        timeout-minutes: 3

      - name: Refresh watch guide
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-watch-guide.mjs || true
        timeout-minutes: 3

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git add client/src/lib/sentimentData.ts client/src/lib/momentumData.ts client/src/lib/watchGuideData.ts
          git commit -m "Midday refresh: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No data changes — skipping commit."
