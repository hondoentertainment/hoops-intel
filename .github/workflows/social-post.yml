name: Social Media Post

on:
  workflow_run:
    workflows: ["Daily Edition Update"]
    types:
      - completed
  workflow_dispatch: # allow manual trigger

jobs:
  post-social:
    runs-on: ubuntu-latest
    # Only run if the daily update succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect social credentials
        id: creds
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          TWITTER_OK=false
          BLUESKY_OK=false
          if [ -n "$TWITTER_API_KEY" ] && [ -n "$TWITTER_API_SECRET" ] && [ -n "$TWITTER_ACCESS_TOKEN" ] && [ -n "$TWITTER_ACCESS_SECRET" ]; then
            TWITTER_OK=true
          fi
          if [ -n "$BLUESKY_HANDLE" ] && [ -n "$BLUESKY_APP_PASSWORD" ]; then
            BLUESKY_OK=true
          fi
          echo "twitter=$TWITTER_OK" >> "$GITHUB_OUTPUT"
          echo "bluesky=$BLUESKY_OK" >> "$GITHUB_OUTPUT"
          if [ "$TWITTER_OK" = "true" ] || [ "$BLUESKY_OK" = "true" ]; then
            echo "mode=live" >> "$GITHUB_OUTPUT"
          else
            echo "mode=dry-run" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to social platforms (or dry-run)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ "${{ steps.creds.outputs.mode }}" = "dry-run" ]; then
            echo "::notice::No Twitter/X or Bluesky secrets configured — running social:preview (dry-run)."
            npm run social:preview
          else
            echo "Posting live (twitter=${{ steps.creds.outputs.twitter }}, bluesky=${{ steps.creds.outputs.bluesky }})"
            node scripts/post-social.mjs
          fi
