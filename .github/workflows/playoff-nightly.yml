# Nightly playoff board sync + series intel key repair + line movement refresh.
# Runs after West Coast games; commits playoffData.ts + lineMovementData.ts when changed.

name: Playoff Nightly Sync

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

concurrency:
  group: playoff-nightly
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - run: npm ci --no-audit --no-fund

      - name: Sync playoff board from ESPN
        run: npm run playoff:sync

      - name: Repair series intel keys when drifted
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm run test:series-intel-keys || npm run playoff:intel

      - name: Refresh line movement closers
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          node scripts/fetch-line-odds.mjs || true
          node scripts/sync-line-movement.mjs sync || true

      - name: Commit playoff + line data
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git add client/src/lib/playoffData.ts client/src/lib/lineMovementData.ts .daily-data/line-openers.json .daily-data/playoff-series.json 2>/dev/null || true
          git diff --staged --quiet && echo "No playoff/line changes" && exit 0
          git commit -m "Playoff nightly: ESPN sync + lines ($(date -u +%Y-%m-%d))"
          git push origin ${{ github.ref_name }}
