# Apply SQL migrations from supabase/migrations to the LINKED hosted project.
#
# Prerequisites (GitHub → Settings → Secrets):
#   SUPABASE_ACCESS_TOKEN  — Personal access token / service token with project access
#   SUPABASE_PROJECT_REF   — Project ref from dashboard URL (e.g. xyzcompanyabcd)
#
# Maintainer: Actions → Run workflow → optional dry-run first.

name: Supabase migrations

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (prints plan, no DDL)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: supabase-db-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Verify secrets present
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing"
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is missing"
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Link project (non-interactive)
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            supabase db push --dry-run
          else
            supabase db push
          fi
