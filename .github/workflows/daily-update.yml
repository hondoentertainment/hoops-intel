name: Daily Edition Update

on:
  schedule:
    # 5:00 AM PST (UTC-8) = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  generate-edition:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save

      - name: Generate today's edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-edition.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push edition
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git add client/src/lib/pulseData.ts client/src/lib/archiveData.ts
          git commit -m "Daily edition: $(date +'%B %-d, %Y' --date='TZ=\"America/Los_Angeles\" now')"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No game data changes — skipping commit."
