name: Daily Edition Update

on:
  schedule:
    # 5:00 AM PST (UTC-8) = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI
    inputs:
      anthropic_api_key:
        description: 'Anthropic API key (leave blank to use repo secret ANTHROPIC_API_KEY)'
        required: false
        default: ''

concurrency:
  group: daily-edition
  cancel-in-progress: false

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season.outputs.active }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check NBA season status (season-mode.mjs)
        id: season
        run: |
          ACTIVE=$(node scripts/check-generator-active.mjs)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "generatorActive=$ACTIVE"

  generate-edition:
    needs: check-season
    if: needs.check-season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key || secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY is not set."
            echo "   Add ANTHROPIC_API_KEY to GitHub Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY is present."

      - name: Run optimized daily generation
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key || secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          node scripts/generate-all-daily.mjs 2>&1 | tee generation.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          if [ "$exit_code" -eq 1 ]; then
            echo "Critical failure — aborting"
            exit 1
          elif [ "$exit_code" -eq 2 ]; then
            echo "⚠️ Partial failure — edition generated but some secondary content failed"
            echo "partial=true" >> $GITHUB_OUTPUT
          fi
        timeout-minutes: 20

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push edition
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "hoops-intel-bot"
          git config user.email "bot@hoopsintel.net"
          git add client/src/lib/ public/feed.xml public/sitemap.xml public/og/
          git commit -m "Daily edition: $(date +'%B %-d, %Y' --date='TZ="America/Los_Angeles" now')"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No game data changes — skipping commit."

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily generation failed — ${today}`;
            // Check if issue already exists for today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'generation-failure',
              per_page: 5,
            });
            const alreadyExists = existing.data.some(i => i.title === title);
            if (!alreadyExists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `## Daily Generation Failure\n\n**Date:** ${today}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the workflow logs for details. Common causes:\n- ESPN API outage\n- Anthropic API key expired or rate limited\n- Schema validation failure\n\nThis issue was auto-created by the daily-update workflow.`,
                labels: ['generation-failure', 'automated'],
              });
            }
