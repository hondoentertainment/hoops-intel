name: CI

# Runs on every push and PR (including nested branch names like feature/foo).
# Three jobs, all independent so they can run in parallel and you can see
# exactly which slice is red:
#   1. verify   — npm ci, vitest, blocking pulse schema + structural content,
#                 generated TS structure, vite build.
#   2. assembly — script pipeline integration tests.
#   3. content  — Advisory editorial checks against pulseData.ts (dates,
#                 featured previews, postseason bracket polish). Notifications
#                 only; never blocks merges.
#
# Local parity with blocking CI: npm run test:ci

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Unit tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Vitest
        run: npx vitest run

      - name: Playoff ↔ pulse edition drift guard
        run: node scripts/validate-playoff-pulse-drift.mjs

      - name: Playoff seriesIntel keys cover playoffSeries
        run: node scripts/verify-series-intel-keys.mjs

      - name: Verify seasonal generator scripts resolve
        run: node scripts/content-schedule.mjs --verify-generators

      - name: Validate archive duplicate ids
        run: node scripts/validate-archive-duplicates.mjs

      - name: Pulse + phase 2 regex schema (pulseData.ts)
        run: node scripts/validate-schema.mjs

      - name: Playbook + generated TS structure
        run: node scripts/validate-generated-structure.mjs

      - name: Pulse structural content (blocking)
        run: node scripts/tests/validate-content.mjs --hard-only

      - name: Season-mode calendar (node:test)
        run: node --test scripts/tests/season-mode.test.mjs

      - name: Vite build
        run: npx vite build

      - name: Verify embed bundle shipped
        run: node scripts/verify-dist-embed.mjs

  assembly:
    name: Pipeline assembly tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Assembly integration tests
        run: node scripts/tests/test-assembly.mjs

  content:
    name: Content validation (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Pulse editorial advisory checks (dates / featured game / playbook polish)
        id: advisory
        run: node scripts/tests/validate-content.mjs --advisory-only

      - name: Annotate advisory failures in workflow summary
        if: failure()
        run: |
          echo "### Advisory pulse validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** FAILED (non-blocking). Review \`pulseData.ts\` / playbook sync consistency — see logs from the preceding step." >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack webhook (optional)
        if: failure()
        env:
          SLACK_DATA_QUALITY_WEBHOOK: ${{ secrets.SLACK_DATA_QUALITY_WEBHOOK }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${SLACK_DATA_QUALITY_WEBHOOK:-}" ]; then
            PAYLOAD="$(printf '{"text":"Advisory Hoops Intel pulse validation failed — %s"}' "$WORKFLOW_RUN_URL")"
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" "$SLACK_DATA_QUALITY_WEBHOOK" || true
          fi
